<title>香港雲杉財富 | Spruce Global Wealth Management</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  :root {
    --bg: #0E2939;
    --gold: #B7A987;
    --card-1: #29565B;
    --card-2: #3B5542;
    --card-3: #914124;
    --card-4: #007681;
    --text-light: rgba(255,255,255,0.85);
    --text-muted: rgba(255,255,255,0.6);
    --radius: 12px;
    --pad: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, 'PingFang SC', 'PingFang HK', 'Microsoft YaHei', 'Roboto', sans-serif;
    background: var(--bg);
    color: #fff;
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  .container {
    max-width: 428px;
    margin: 0 auto;
    min-height: 100vh;
    position: relative;
  }

  /* ---- Language Switcher ---- */
  .lang-switcher {
    position: fixed;
    top: 12px;
    right: var(--pad);
    z-index: 1000;
    display: flex;
    gap: 6px;
  }
  .lang-switcher button {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    color: var(--text-muted);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 14px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.25s;
    white-space: nowrap;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .lang-switcher button.active {
    background: var(--gold);
    color: #0E2939;
    border-color: var(--gold);
    font-weight: 600;
  }

  /* ---- Views ---- */
  .view {
    display: none;
    animation: fadeSlideIn 0.35s ease;
  }
  .view.active { display: block; }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ========== HERO ========== */
  .hero {
    position: relative;
    height: 70vh;
    min-height: 420px;
    background: url('../素材/Honkong_Skyline.jpeg') center/cover no-repeat;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px var(--pad);
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .hero > * { position: relative; z-index: 1; }
  .hero-logo {
    height: 50px;
    width: auto;
    margin-bottom: 24px;
  }
  .hero-slogan {
    font-size: 26px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.05em;
    line-height: 1.4;
  }
  .hero-slogan .gold {
    color: var(--gold);
  }

  /* ========== SECTIONS ========== */
  .section {
    padding: 40px var(--pad);
  }
  .section-title {
    font-size: 24px;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 20px;
    letter-spacing: 0.03em;
  }
  .section-text {
    color: var(--text-light);
    font-size: 15px;
    margin-bottom: 16px;
  }

  /* ---- About ---- */
  .about-block p + p { margin-top: 10px; }

  /* ---- Service Cards ---- */
  .card-grid {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .card {
    border-radius: var(--radius);
    padding: 24px 20px;
    color: #fff;
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .card:active { transform: scale(0.98); }
  .card-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .card-icon {
    font-size: 24px;
    opacity: 0.85;
    flex-shrink: 0;
  }
  .card-title {
    font-size: 20px;
    font-weight: 700;
  }
  .card-desc {
    font-size: 14px;
    opacity: 0.85;
    margin-bottom: 16px;
    line-height: 1.5;
  }
  .card-more {
    font-size: 13px;
    font-weight: 600;
    opacity: 0.9;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .card-more i { font-size: 11px; transition: transform 0.2s; }
  .card:hover .card-more i { transform: translateX(3px); }

  .card-bg-1 { background: var(--card-1); }
  .card-bg-2 { background: var(--card-2); }
  .card-bg-3 { background: var(--card-3); }
  .card-bg-4 { background: var(--card-4); }

  /* ---- Advantages ---- */
  .advantage-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .advantage-item {
    background: var(--card-1);
    border-radius: var(--radius);
    padding: 20px 18px;
  }
  .advantage-item:nth-child(2) { background: var(--card-2); }
  .advantage-item:nth-child(3) { background: var(--card-3); }
  .advantage-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .advantage-icon {
    font-size: 22px;
    color: var(--gold);
    flex-shrink: 0;
  }
  .advantage-name {
    font-size: 17px;
    font-weight: 700;
    color: var(--gold);
  }
  .advantage-text {
    font-size: 14px;
    opacity: 0.85;
  }

  /* ---- Team ---- */
  .team-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .team-card {
    background: var(--card-4);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    gap: 12px;
    align-items: center;
    cursor: pointer;
    transition: background 0.25s;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    flex-wrap: wrap;
  }
  .team-card:nth-child(2) { background: var(--card-1); }
  .team-card:nth-child(3) { background: var(--card-2); }
  .team-card:nth-child(4) { background: var(--card-3); }
  .team-card.expanded { align-items: flex-start; }
  .team-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    color: var(--gold);
    flex-shrink: 0;
  }
  .team-summary {
    flex: 1;
    min-width: 0;
  }
  .team-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 1px;
  }
  .team-role {
    font-size: 13px;
    opacity: 0.7;
  }
  .team-expand-icon {
    font-size: 12px;
    color: var(--gold);
    opacity: 0.6;
    transition: transform 0.25s;
    flex-shrink: 0;
  }
  .team-card.expanded .team-expand-icon {
    transform: rotate(180deg);
  }
  .team-detail {
    display: none;
    width: 100%;
    padding-top: 12px;
    margin-top: 4px;
    border-top: 1px solid rgba(255,255,255,0.1);
  }
  .team-card.expanded .team-detail { display: block; }
  .team-bio {
    font-size: 13px;
    opacity: 0.85;
    line-height: 1.6;
  }

  /* ---- Footer ---- */
  .footer {
    padding: 40px var(--pad) 32px;
    text-align: center;
    border-top: 1px solid rgba(255,255,255,0.08);
    font-size: 13px;
    color: var(--text-muted);
  }
  .footer .section-title {
    margin-bottom: 12px;
  }
  .footer-tagline {
    font-size: 14px;
    color: var(--text-light);
    margin-bottom: 20px;
    line-height: 1.6;
  }
  .footer-contact {
    margin-bottom: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .footer-contact a, .footer-contact span {
    color: var(--text-light);
    text-decoration: none;
  }
  .footer-contact i {
    color: var(--gold);
    margin-right: 6px;
    width: 14px;
  }
  .footer-copy {
    font-size: 12px;
    opacity: 0.5;
  }

  /* ========== DETAIL VIEW ========== */
  .detail-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    padding: 14px var(--pad);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .btn-back {
    background: rgba(255,255,255,0.1);
    border: none;
    color: var(--gold);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    padding: 6px 14px;
    border-radius: 20px;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: background 0.2s;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-back:active { background: rgba(255,255,255,0.2); }
  .detail-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--gold);
  }
  .detail-body {
    padding: 24px var(--pad) 40px;
  }
  .detail-section {
    margin-bottom: 28px;
  }
  .detail-section-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .detail-section p {
    font-size: 14px;
    color: var(--text-light);
    margin-bottom: 10px;
  }
  .detail-section ul {
    list-style: none;
    padding: 0;
  }
  .detail-section ul li {
    font-size: 14px;
    color: var(--text-light);
    padding: 6px 0 6px 18px;
    position: relative;
  }
  .detail-section ul li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 14px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0.7;
  }

  /* ---- Scrollbar ---- */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

  /* ---- Larger screens: center the container ---- */
  @media (min-width: 429px) {
    .container {
      border-left: 1px solid rgba(255,255,255,0.06);
      border-right: 1px solid rgba(255,255,255,0.06);
    }
  }
</style>
</head>

  // ==================== STATE ====================
  let currentLang = localStorage.getItem('spruce-lang') || 'zh-HK';
  let currentView = 'home';

  // ==================== DOM REFS ====================
  const viewHome    = document.getElementById('view-home');
  const viewWealth  = document.getElementById('view-wealth-planning');
  const viewGlobal  = document.getElementById('view-global-allocation');
  const viewInsure  = document.getElementById('view-hk-insurance');

  const detailViews = {
    'wealth-planning': viewWealth,
    'global-allocation': viewGlobal,
    'hk-insurance': viewInsure
  };

  const allViews = [viewHome, viewWealth, viewGlobal, viewInsure];

  function getViewId(hash) {
    const m = { '#wealth-planning': 'wealth-planning', '#global-allocation': 'global-allocation', '#hk-insurance': 'hk-insurance' };
    return m[hash] || null;
  }

  // ==================== APPLY LANGUAGE ====================
  function applyLanguage(lang) {
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (i18nData[lang] && i18nData[lang][key]) {
        el.textContent = i18nData[lang][key];
      }
    });
    document.documentElement.lang = lang;
    // Update lang switcher buttons
    document.querySelectorAll('#langSwitcher button').forEach(btn => {
      btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
    });
  }

  // ==================== VIEW SWITCHING ====================
  function showView(viewName, pushState = true) {
    allViews.forEach(v => v.classList.remove('active'));
    currentView = viewName;

    if (viewName === 'home') {
      viewHome.classList.add('active');
      if (pushState) history.pushState({ view: 'home' }, '', window.location.pathname);
    } else {
      const dv = detailViews[viewName];
      if (dv) dv.classList.add('active');
      if (pushState) history.pushState({ view: viewName }, '', '#' + viewName);
    }

    // Re-apply language for newly visible content
    applyLanguage(currentLang);
    // Scroll to top
    window.scrollTo(0, 0);
  }

  // ==================== EVENT LISTENERS ====================

  // Language switcher
  document.getElementById('langSwitcher').addEventListener('click', e => {
    const btn = e.target.closest('button');
    if (!btn) return;
    const lang = btn.getAttribute('data-lang');
    if (lang && lang !== currentLang) {
      currentLang = lang;
      localStorage.setItem('spruce-lang', lang);
      applyLanguage(lang);
    }
  });

  // Service card clicks
  document.querySelectorAll('.card[data-view]').forEach(card => {
    card.addEventListener('click', () => {
      const viewName = card.getAttribute('data-view');
      if (viewName) showView(viewName);
    });
  });

  // Team card expand/collapse — click to toggle detailed bio
  document.getElementById('teamGrid').addEventListener('click', e => {
    const card = e.target.closest('.team-card');
    if (!card) return;
    const wasExpanded = card.classList.contains('expanded');
    document.querySelectorAll('.team-card.expanded').forEach(c => c.classList.remove('expanded'));
    if (!wasExpanded) card.classList.add('expanded');
  });

  // Back buttons — use browser history for correct back/forward behavior
  document.querySelectorAll('[data-action="back"]').forEach(btn => {
    btn.addEventListener('click', () => history.back());
  });

  // Browser back/forward
  window.addEventListener('popstate', e => {
    if (e.state && e.state.view) {
      showView(e.state.view, false);
    } else {
      const hashView = getViewId(window.location.hash);
      if (hashView) {
        showView(hashView, false);
      } else {
        showView('home', false);
      }
    }
  });

  // ==================== INIT ====================
  function init() {
    applyLanguage(currentLang);

    const hashView = getViewId(window.location.hash);
    if (hashView) {
      // Replace the raw URL entry with a home state, then push the detail view.
      // This ensures "back" goes to home, not away from the site.
      history.replaceState({ view: 'home' }, '', window.location.pathname);
      showView(hashView);
    } else {
      showView('home', false);
      history.replaceState({ view: 'home' }, '', window.location.pathname);
    }
  }

  init();
})();
</script>
